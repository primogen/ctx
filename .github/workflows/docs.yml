name: Deploy docs to GitHub Pages

# Build the MkDocs Material site and publish to GitHub Pages on every push
# to main. Also deployable on demand via the workflow_dispatch trigger.

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

# Allow only one concurrent deploy; cancel in-progress runs on a new push.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # Required by mkdocs git-revision plugins if added.

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt
          python -m pip install -e ".[dev]"

      - name: Validate public docs tracker
        run: |
          python -m pytest -q --no-cov \
            src/tests/test_feature_user_story_tracker.py \
            src/tests/test_dashboard_user_story_tracker.py

      - name: Build site (strict)
        run: |
          python -m mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy_attempt_1.outputs.page_url || steps.deploy_attempt_2.outputs.page_url || steps.deploy_attempt_3.outputs.page_url }}
    steps:
      - name: Deploy (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000

      - name: Pause before deploy retry
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 60

      - name: Deploy (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000

      - name: Pause before final deploy retry
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 120

      - name: Deploy (attempt 3)
        id: deploy_attempt_3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
